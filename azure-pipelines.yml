trigger:
  - main

pool: 
 name: 'Azure Pipelines'     # ensure Linux path & toolcache
# azure-pipelines.yml

variables:
  serviceConnection: 'azurerm-spn-or-oidc'   # Azure RM service connection name
  tf_working_dir: 'infra'
  tfstate_rg: 'rg-tfstate'
  tfstate_sa: 'sttfstate123456'
  tfstate_container: 'tfstate'
  tfstate_key: 'logicapp-consumption.tfstate'

stages:
- stage: Deploy
  jobs:
  - job: Terraform
    steps:
    - checkout: self

    # Install Terraform on the hosted agent
    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    # Init with AzureRM backend
    - task: TerraformTaskV4@4
      displayName: 'terraform init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(tf_working_dir)'
        backendServiceArm: 'Myconnectionactive'
        backendAzureRmResourceGroupName: 'demonewtest_group'
        backendAzureRmStorageAccountName: 'demonewtestgroupb2e7'
        backendAzureRmContainerName: 'demonew'
        backendAzureRmKey: '$(tfstate_key)'

    # Plan
    - task: TerraformTaskV4@4
      displayName: 'terraform plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(tf_working_dir)'
        environmentServiceNameAzureRM: 'Myconnectionactive'

    # Apply (consider approvals before prod)
    - task: TerraformTaskV4@4
      displayName: 'terraform apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve'
        environmentServiceNameAzureRM: 'Myconnectionactive'
