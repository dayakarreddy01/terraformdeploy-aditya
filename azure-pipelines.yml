trigger:
  - main

pool:
  name: 'Azure Pipelines'   # Microsoft-hosted; Ubuntu underneath

variables:
  serviceConnection: 'Myconnectionactive'   # <-- Use your existing service connection
  tf_working_dir: 'infra'                   # <-- folder where providers.tf, main.tf exist
  tfstate_rg: 'rg-tfstate'
  tfstate_sa: 'sttfstate123456'
  tfstate_container: 'tfstate'
  tfstate_key: 'logicapp-consumption.tfstate'
  tf_version: '1.14.0'

stages:
- stage: Terraform
  displayName: Terraform Build stage
  jobs:
  - job: Build
    displayName: Terraform Build Job
    steps:
    - task: TerraformInstaller@1
      displayName: 'Install Terraform $(tf_version)'
      inputs:
        terraformVersion: '$(tf_version)'

    # Format
    - task: TerraformTask@5
      displayName: 'terraform fmt'
      inputs:
        provider: 'azurerm'
        command: 'custom'
        workingDirectory: '$(tf_working_dir)'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: 'Myconnectionactive'

    # INIT (must be before validate/plan/apply)
    - task: TerraformTask@5
      displayName: 'terraform init (azurerm backend)'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(tf_working_dir)'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'Myconnectionactive'
        backendAzureRmResourceGroupName: '$(tfstate_rg)'
        backendAzureRmStorageAccountName: '$(tfstate_sa)'
        backendAzureRmContainerName: '$(tfstate_container)'
        backendAzureRmKey: '$(tfstate_key)'

    # VALIDATE
    - task: TerraformTask@5
      displayName: 'terraform validate'
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(tf_working_dir)'

    # PLAN
    - task: TerraformTask@5
      displayName: 'terraform plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(tf_working_dir)'
        commandOptions: '-lock=false -out=tfplan'
        environmentServiceNameAzureRM: 'Myconnectionactive'

    # APPLY (optional / gated)
    - task: TerraformTask@5
      displayName: 'terraform apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(tf_working_dir)'
        commandOptions: '-auto-approve -lock=false tfplan'
        environmentServiceNameAzureRM: 'Myconnectionactive'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
