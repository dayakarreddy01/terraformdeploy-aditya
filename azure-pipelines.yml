pool:
  vmImage: 'Azure Pipelines'     # ensure Linux path & toolcache

steps:
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- script: |
    terraform -version
    which terraform
  displayName: 'Show Terraform version'

# Azure login (Service Connection)
- task: AzureCLI@2
  displayName: 'Az login'
  inputs:
    azureSubscription: 'Myconnectionactive'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: az account show

# Run terraform with -chdir to your folder
- script: |
    TF_DIR="$(System.DefaultWorkingDirectory)/Folder/terraform"
    terraform -chdir="$TF_DIR" init \
      -backend-config="resource_group_name=rg-dxDevUKWest" \
      -backend-config="storage_account_name=demonewtestgroupb2e7" \
      -backend-config="container_name=demonew" \
      -backend-config="key=trf/terraform.tfstate" \
      -backend-config="subscription_id=12486a52-70e3-4ae6-9f94-e6bacd147419"
    terraform -chdir="$TF_DIR" validate
    terraform -chdir="$TF_DIR" plan -lock=false
    terraform -chdir="$TF_DIR" apply -auto-approve -lock=false
