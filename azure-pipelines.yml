trigger:
  - main

pool:
 name: 'Azure Pipelines'

stages:
  - stage: Terraform
    displayName: Terraform Build stage
    jobs:
    - job: Build
      displayName:  Terraform Build Job
      steps:
      - task: TerraformInstaller@1
        inputs: 
          terraformVersion: 'latest'
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          backendServiceArm: 'terraform_consumpetion_logicapp1'
          backendAzureRmOverrideSubscriptionID: '771cd5c1-6b02-4169-a5cc-dc344f0e8941'
          backendAzureRmResourceGroupName: 'New_LA'
          backendAzureRmStorageAccountName: 'mynewstoragestr123'
          backendAzureRmContainerName: 'demonewconnect'
          backendAzureRmKey: 'trf/terraform.tfstate'
        
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'validate'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'plan'
          commandOptions: '-lock=false'
          environmentServiceNameAzureRM: 'terraform_consumpetion_logicapp1'
          environmentAzureRmOverrideSubscriptionID: '771cd5c1-6b02-4169-a5cc-dc344f0e8941'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'apply'
          commandOptions: '--auto-approve -lock=false'
          environmentServiceNameAzureRM: 'terraform_consumpetion_logicapp1'
          environmentAzureRmOverrideSubscriptionID: '771cd5c1-6b02-4169-a5cc-dc344f0e8941'
      

