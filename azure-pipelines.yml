trigger:
  - main

pool: 
 name: 'Azure Pipelines'     # ensure Linux path & toolcache
# azure-pipelines.yml

variables:
  serviceConnection: 'azurerm-spn-or-oidc'   # Azure RM service connection name
  tf_working_dir: 'infra'
  tfstate_rg: 'rg-tfstate'
  tfstate_sa: 'sttfstate123456'
  tfstate_container: 'tfstate'
  tfstate_key: 'logicapp-consumption.tfstate'

stages:
  - stage: Terraform
    displayName: Terraform Build stage
    jobs:
    - job: Build
      displayName:  Terraform Build Job
      steps:
      - task: TerraformInstaller@1
        inputs:
          terraformVersion: 'latest'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'custom'
          outputTo: 'console'
          customCommand: 'fmt'
          environmentServiceNameAzureRM: 'Myconnectionactive'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'validate'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'plan'
          commandOptions: '-lock=false'
          environmentServiceNameAzureRM: 'Myconnectionactive'
          environmentAzureRmOverrideSubscriptionID: '12486a52-70e3-4ae6-9f94-e6bacd147419'

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'apply'
          commandOptions: '--auto-approve -lock=false'
          environmentServiceNameAzureRM: 'Myconnectionactive'
          environmentAzureRmOverrideSubscriptionID: '12486a52-70e3-4ae6-9f94-e6bacd147419'